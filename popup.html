<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 200px;
            background-color: #111422;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #3bb54a;
        }

        .switch-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

            .switch input {
                opacity: 0;
                width: 0;
                height: 0;
            }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .3s;
            border-radius: 24px;
        }

            .slider:before {
                position: absolute;
                content: "";
                height: 18px;
                width: 18px;
                left: 3px;
                bottom: 3px;
                background-color: white;
                transition: .3s;
                border-radius: 50%;
            }

        input:checked + .slider {
            background-color: #3bb54a;
        }

            input:checked + .slider:before {
                transform: translateX(22px);
            }

        .status-text {
            font-size: 13px;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="title">Cybershoke Helper by fLYR-</div>
    <div class="switch-container">
        <label class="switch">
            <input type="checkbox" id="toggleScript">
            <span class="slider"></span>
        </label>
        <span class="status-text" id="statusLabel">Loading...</span>
    </div>
    <script src="popup.js"></script>
</body>
</html>
